<header class="bg-gradient-to-br from-[#002244] via-[#003366] to-[#0a192f] border-b border-blue-900/40 h-24 flex items-center justify-between px-12 sticky top-0 z-50 shadow-lg">
    
    
    <div class="flex items-center gap-14">  
            <div class="px-5 py-2.5 rounded-2xl bg-white text-[#003366] font-sans font-black tracking-tighter text-xl select-none shadow-md">
                LWU
            </div>
            <span class="font-black text-lg tracking-wide text-white hidden sm:block">Learning With Us</span>
        </a>

     
        <nav class="flex items-center gap-4">
            <a href="{% url 'dashboard' %}" class="px-5 py-3 text-base font-bold rounded-2xl transition-colors {% if current_page == 'dashboard' or not current_page %} bg-white/15 text-white {% else %} text-blue-200 hover:text-white hover:bg-white/5 {% endif %}">
                Dashboard
            </a>
            <a href="{% url 'course' %}" class="px-5 py-3 text-base font-bold rounded-2xl transition-colors {% if current_page == 'course' or not current_page %} bg-white/15 text-white {% else %} text-blue-200 hover:text-white hover:bg-white/5 {% endif %}">
                My Courses
            </a>
            <a href="{% url 'ebook' %}" class="px-5 py-3 text-base font-bold rounded-2xl transition-colors {% if current_page == 'ebook' %} bg-white/15 text-white {% else %} text-blue-200 hover:text-white hover:bg-white/5 {% endif %}">
                E-Books
            </a>
            <a href="{% url 'purchase_history'%}" class="px-5 py-3 text-base font-bold rounded-2xl transition-colors {% if current_page == 'purchase_history' %} bg-white/15 text-white {% else %} text-blue-200 hover:text-white hover:bg-white/5 {% endif %}">
                History
            </a>
        </nav>
    </div>

   
    <div class="flex items-center gap-6">\
         <div class="relative inline-block text-left" x-data="{ open: false }">  <!-- Tombol Utama Kapsul yang Menyatu dengan Background Gradasi -->
            <button @click="open = !open" @click.away="open = false" class="flex items-center gap-5 px-6 py-3.5 bg-white/10 hover:bg-white/20 border border-white/10 rounded-full text-white transition-all shadow-inner group cursor-pointer focus:outline-none backdrop-blur-sm">
                <i class="fa-regular fa-user text-lg text-cyan-300 group-hover:text-white transition-colors"></i>
                <span class="text-base font-extrabold tracking-wide text-white transition-colors">
                    {{ request.user.username }}
                </span>
                <i class="fa-solid text-sm text-cyan-300 group-hover:text-white transition-colors" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </button>

            <div x-show="open" 
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="transform opacity-0 scale-95"
                 x-transition:enter-end="transform opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="transform opacity-100 scale-100"
                 x-transition:leave-end="transform opacity-0 scale-95"
                 class="absolute right-0 mt-3 w-56 rounded-2xl bg-[#111827] border border-slate-800/80 p-2 shadow-2xl z-50 flex flex-col gap-1"
                 style="display: none;">
                
               
                <a href="{% url 'logout' %}" class="flex items-center gap-3.5 px-4 py-3 rounded-xl text-sm font-bold text-rose-400 hover:bg-rose-950/30 hover:text-rose-300 transition-colors">
                    <i class="fa-solid fa-right-from-bracket w-4 h-4"></i>
                    <span>Sign Out</span>
                </a>
            </div>
        </div>

    </div>
</header>
